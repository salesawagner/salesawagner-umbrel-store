services:
  app_proxy:
    environment:
      APP_HOST: sabnzbd
      APP_PORT: 8081
      PROXY_AUTH_WHITELIST: /api/*
    container_name: sabnzbd_app_proxy_1
    restart: unless-stopped

  sabnzbd:
    image: ghcr.io/hotio/sabnzbd
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=8081/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - /mnt/downloads:/downloads
    restart: unless-stopped

  mac:
    image: >-
      getumbrel/media-app-configurator:v1.3.0@sha256:67e75dd9f5a14402b7816119a8e20189bc2465484cea077909d164687e59742b
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    environment:
      APP_ID: salesawagner-sabnzbd
      APP_URL: http://sabnzbd:8081
    container_name: salesawagner-sabnzbd_mac_1
