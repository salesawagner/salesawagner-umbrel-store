services:
  app_proxy:
    environment:
      APP_HOST: qbittorrent
      APP_PORT: 8082
      PROXY_AUTH_WHITELIST: /api/*
    container_name: qbittorrent_app_proxy_1
    restart: unless-stopped

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=8082/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - /mnt/downloads:/downloads
    restart: unless-stopped

  mac:
    image: >-
      getumbrel/media-app-configurator:v1.3.0@sha256:67e75dd9f5a14402b7816119a8e20189bc2465484cea077909d164687e59742b
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    environment:
      APP_ID: salesawagner-qbittorrent
      APP_URL: http://qbittorrent:8082
    container_name: salesawagner-qbittorrent_mac_1
