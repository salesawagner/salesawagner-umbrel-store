services:
  app_proxy:
    environment:
      APP_HOST: whisparr
      APP_PORT: 6969
      PROXY_AUTH_WHITELIST: /api/*
    container_name: whisparr_app_proxy_1
    restart: unless-stopped

  server:
    image: ghcr.io/hotio/whisparr
    container_name: whisparr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=6969/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - /mnt/downloads:/downloads
      - /mnt/media/media/xxx/swap:/media/swap
      - /mnt/media/media/xxx/web:/media/web
    restart: unless-stopped

  mac:
    image: >-
      getumbrel/media-app-configurator:v1.3.0@sha256:67e75dd9f5a14402b7816119a8e20189bc2465484cea077909d164687e59742b
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    environment:
      APP_ID: salesawagner-whisparr
      APP_URL: http://whisparr:6969
    container_name: salesawagner-whisparr_mac_1
