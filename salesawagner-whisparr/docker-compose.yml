services:
  server:
    image: ghcr.io/thespad/whisparr:latest
    container_name: salesawagner-whisparr_server_1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    ports:
      - ${APP_PORT}:6969
    restart: on-failure
