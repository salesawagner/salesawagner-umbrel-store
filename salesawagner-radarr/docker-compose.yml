services:
  app_proxy:
    environment:
      APP_HOST: radarr
      APP_PORT: 7878
    container_name: radarr_app_proxy_1
    restart: unless-stopped

  radarr:
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=7878/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - /mnt/media/media/movies:/media/movies
      - /mnt/downloads:/downloads
    restart: unless-stopped

  mac:
    image: >-
      getumbrel/media-app-configurator:v1.3.0@sha256:67e75dd9f5a14402b7816119a8e20189bc2465484cea077909d164687e59742b
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    environment:
      APP_ID: salesawagner-radarr
      APP_URL: http://radarr:7878
      RADARR_URL: http://radarr:7878
      RADARR_CONFIG_XML: ${APP_PROWLARR_RADARR_CONFIG_XML}
    container_name: salesawagner-radarr_mac_1