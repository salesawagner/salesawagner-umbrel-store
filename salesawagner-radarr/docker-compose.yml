services:
  app_proxy:
    environment:
      APP_HOST: radarr_server_1
      APP_PORT: 7878
      # Se quiser liberar API sem auth reverso do Umbrel:
      # PROXY_AUTH_WHITELIST: /api/*
    container_name: radarr_app_proxy_1
    restart: unless-stopped

  server:
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr_server_1
    environment:
      - PUID=1000         # ajuste se seu usuário não for 1000
      - PGID=1000         # ajuste se seu grupo não for 1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=7878/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - /mnt/media/media/movies:/media/movies
      - /mnt/downloads:/downloads
    restart: unless-stopped