services:
  app_proxy:
    environment:
      APP_HOST: flaresolverr_server_1
      APP_PORT: 8191
      PROXY_AUTH_WHITELIST: /api/*
    container_name: flaresolverr_app_proxy_1
    restart: unless-stopped

  server:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr_server_1
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=8191/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - /mnt/downloads:/downloads
      - /mnt/media/media:/media
    restart: unless-stopped

  mac:
    image: >-
      getumbrel/media-app-configurator:v1.3.0@sha256:67e75dd9f5a14402b7816119a8e20189bc2465484cea077909d164687e59742b
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    environment:
      APP_ID: salesawagner-flaresolverr
      APP_URL: http://flaresolverr_server_1:8191
    container_name: salesawagner-flaresolverr_mac_1
