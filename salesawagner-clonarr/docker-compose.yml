services:
  server:
    image: ghcr.io/prophetse7en/clonarr:latest
    container_name: salesawagner-clonarr_server_1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    ports:
      - ${APP_PORT}:7777
    restart: on-failure