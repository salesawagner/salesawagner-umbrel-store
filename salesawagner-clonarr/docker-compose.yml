services:
  app_proxy:
    environment:
      APP_HOST: clonarr
      APP_PORT: 7777
      PROXY_AUTH_WHITELIST: /api/*
    container_name: clonarr_app_proxy_1
    restart: unless-stopped

  clonarr:
    image: ghcr.io/prophetse7en/clonarr
    container_name: clonarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Sao_Paulo
      - WEBUI_PORTS=7777/tcp
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    restart: unless-stopped

  mac:
    image: >-
      getumbrel/media-app-configurator:v1.3.0@sha256:67e75dd9f5a14402b7816119a8e20189bc2465484cea077909d164687e59742b
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    environment:
      APP_ID: salesawagner-clonarr
      APP_URL: http://clonarr:7777
      RADARR_URL: http://radarr:7878
      RADARR_CONFIG_XML: ${APP_PROWLARR_RADARR_CONFIG_XML}
      SONARR_URL: http://sonarr:8989
      SONARR_CONFIG_XML: ${APP_PROWLARR_SONARR_CONFIG_XML}
    container_name: salesawagner-clonarr_mac_1
